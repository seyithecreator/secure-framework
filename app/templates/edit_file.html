{% extends "base.html" %}
{% block title %}Edit · {{ filename }}{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <p class="page-eyebrow"><a href="/dashboard" class="breadcrumb-link">Dashboard</a> / <a href="/files/" class="breadcrumb-link">Vault</a> / Edit</p>
        <h1 class="page-title" style="display:flex;align-items:center;gap:10px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            {{ filename }}
        </h1>
    </div>
    <a href="/files/" class="btn-page-secondary">Cancel</a>
</div>

<div class="editor-card">
    <form action="/files/edit/{{ filename }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="editor-toolbar">
            <span class="editor-filename">{{ filename }}</span>
            <span class="editor-hint">Decrypted in memory &middot; Will be re-encrypted on save</span>
        </div>
        <textarea name="content" class="editor-textarea" required>{{ content }}</textarea>
        <div class="editor-footer">
            <a href="/files/" class="btn-page-secondary">Discard Changes</a>
            <button type="submit" class="btn-page-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save &amp; Encrypt
            </button>
        </div>
    </form>
</div>
{% endblock %}
